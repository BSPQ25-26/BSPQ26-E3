server {
    listen 80;
    server_name localhost;

    # Tolerate large request headers (Supabase auth cookies, accumulated dev sessions, etc.)
    # Default is 4 buffers of 8k, which can be exceeded after a few logins/test runs and
    # surfaces as "400 Bad Request - Request Header Or Cookie Too Large".
    large_client_header_buffers 4 32k;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}
