<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
</head>
<body>
    <h1>Admin Panel</h1>
    <form id="loginForm" onsubmit="event.preventDefault(); loginAdmin();">
        <p>
            <label for="loginEmail">Email</label><br>
            <input type="email" id="loginEmail" placeholder="admin@example.com" required>
        </p>
        <p>
            <label for="loginPassword">Password</label><br>
            <input type="password" id="loginPassword" placeholder="password" required>
        </p>
        <button type="submit">Sign in</button>
    </form>
    <p id="msg"></p>

    <script>
        if (sessionStorage.getItem('adminToken')) {
            window.location.href = '/admin.html';
        }

        async function loginAdmin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const msg = document.getElementById('msg');

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.status === 403) {
                    msg.textContent = 'Email not confirmed. Check your inbox.';
                    return;
                }

                if (!response.ok) {
                    msg.textContent = 'Invalid email or password.';
                    return;
                }

                const data = await response.json();

                if (!data.profile || !data.profile.admin) {
                    msg.textContent = 'Access denied. You are not an admin.';
                    return;
                }

                sessionStorage.setItem('adminToken', data.access_token);
                sessionStorage.setItem('adminUsername', data.profile.username);
                window.location.href = '/admin.html';

            } catch (error) {
                msg.textContent = 'Could not connect to the API.';
            }
        }
    </script>
</body>
</html>
